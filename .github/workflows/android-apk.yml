name: Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build arm64 APK
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read

    env:
      EXPO_NO_TELEMETRY: '1'
      ANDROID_NDK_VERSION: '27.1.12297006'
      ANDROID_BUILD_TOOLS_VERSION: '36.0.0'
      ANDROID_PLATFORM_VERSION: '36'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build components
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            'platform-tools' \
            "platforms;android-${ANDROID_PLATFORM_VERSION}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            'cmake;3.22.1'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test novel parsers
        run: bun test

      - name: Check Expo project
        run: bunx expo-doctor

      - name: Build Release APK
        run: bun run android:apk -- dist

      - name: Read build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(bun -e "const config = await Bun.file('app.json').json(); console.log(config.expo.version);")"
          APK_NAME="pixiv-novel-reader-v${VERSION}-arm64.apk"
          APK_PATH="dist/${APK_NAME}"
          CHECKSUM_PATH="${APK_PATH}.sha256"
          SHA256="$(cut -d ' ' -f 1 "$CHECKSUM_PATH")"

          if [[ "${GITHUB_REF_TYPE}" == 'tag' ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "Tag v${TAG_VERSION}とapp.jsonのversion ${VERSION}が一致してないよ" >&2
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$CHECKSUM_PATH" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Verify APK package and signature
        shell: bash
        run: |
          set -euo pipefail
          APK='${{ steps.metadata.outputs.apk_path }}'
          BUILD_TOOLS="$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS_VERSION}"

          "$BUILD_TOOLS/aapt" dump badging "$APK" | head -n 3
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK"

          unzip -l "$APK" | grep 'assets/index.android.bundle'
          unzip -l "$APK" | grep 'lib/arm64-v8a/libhermesvm.so'

      - name: Write job summary
        shell: bash
        run: |
          {
            echo '## 📱 Android APK'
            echo
            echo '- Version: `${{ steps.metadata.outputs.version }}`'
            echo '- ABI: `arm64-v8a`'
            echo '- File: `${{ steps.metadata.outputs.apk_name }}`'
            echo '- SHA-256: `${{ steps.metadata.outputs.sha256 }}`'
            echo '- Runtime: Hermes'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixiv-novel-reader-v${{ steps.metadata.outputs.version }}-arm64
          path: |
            ${{ steps.metadata.outputs.apk_path }}
            ${{ steps.metadata.outputs.checksum_path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          pattern: pixiv-novel-reader-*
          path: dist
          merge-multiple: true

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pixiv Novel Reader ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/*.sha256
          fail_on_unmatched_files: true
